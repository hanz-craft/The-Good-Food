<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🥗 The Good Food</title>
    <style>
        /* 🎨 GLOBAL STYLES & RAINBOW THEME */
        :root {
            --primary: #FF9AA2; /* Pastel Red/Pink */
            --secondary: #FFB7B2; /* Pastel Orange */
            --yellow: #FFDAC1;
            --green: #E2F0CB;
            --blue: #B5EAD7;
            --purple: #C7CEEA;
            --text-dark: #333;
            --bg-color: transparent; /* Changed to transparent as requested */
        }

        * {
            box-sizing: border-box;
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
            user-select: none;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #F9F9F9; /* Base color so it isn't pure white */
            color: var(--text-dark);
            text-align: center;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* 🌈 NEW: FLOATING BACKGROUND STYLES */
        .floating-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1; /* Keeps it strictly behind all content */
            pointer-events: none; /* Ensures foods cannot be clicked */
            overflow: hidden;
        }

        .floating-food {
            position: absolute;
            opacity: 0.15; /* 10-20% opacity as requested */
            animation: floatUp linear infinite;
            filter: blur(1px); /* Slight blur for softness */
        }

        @keyframes floatUp {
            0% {
                transform: translateY(110vh) translateX(0px) rotate(0deg);
            }
            50% {
                transform: translateY(40vh) translateX(30px) rotate(10deg);
            }
            100% {
                transform: translateY(-30vh) translateX(-20px) rotate(-15deg);
            }
        }

        /* 🏠 NAVIGATION BAR */
        .navbar {
            display: flex;
            justify-content: center;
            gap: 10px;
            background-color: white;
            padding: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            position: sticky;
            top: 0;
            z-index: 100;
            flex-wrap: wrap;
        }

        .nav-btn {
            background-color: var(--purple);
            border: 4px solid white;
            border-radius: 20px;
            padding: 10px 20px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 0px #a1abc9;
            transition: transform 0.1s;
        }

        .nav-btn:active {
            transform: translateY(4px);
            box-shadow: 0 0px 0px #a1abc9;
        }

        .nav-btn.home { background-color: var(--primary); box-shadow: 0 4px 0px #d4787f; }
        .nav-btn.review { background-color: var(--secondary); box-shadow: 0 4px 0px #d49590; }
        .nav-btn.menu { background-color: var(--yellow); box-shadow: 0 4px 0px #d4b49d; }
        .nav-btn.exit { background-color: #ff6b6b; color: white; box-shadow: 0 4px 0px #c94c4c; }

        /* SCREENS */
        .screen {
            display: none;
            padding: 20px;
            flex-grow: 1;
            animation: fadeIn 0.5s ease-in-out;
            position: relative; /* Ensure content sits above background */
            z-index: 10;
        }
        .screen.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        h1 { font-size: 3rem; color: #ff6b6b; margin-top: 10px; text-shadow: 2px 2px 0px var(--yellow); }

        /* 📚 VOCABULARY REVIEW */
        .vocab-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }

        .vocab-card {
            background-color: white;
            border: 8px solid var(--blue);
            border-radius: 25px;
            padding: 30px;
            width: 180px;
            cursor: pointer;
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s, border-color 0.3s;
        }

        .vocab-card:hover, .vocab-card:active {
            transform: scale(1.15);
            border-color: var(--primary);
            z-index: 10;
        }

        .vocab-emoji { font-size: 5rem; display: block; animation: float 3s ease-in-out infinite; }
        .vocab-text { font-size: 1.8rem; font-weight: bold; margin-top: 10px; display: block; }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* 🎮 GAME SCREEN */
        .scoreboard {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .player-score {
            background-color: white;
            padding: 15px 30px;
            border-radius: 20px;
            font-size: 1.5rem;
            font-weight: bold;
            border: 5px solid transparent;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .player-score.active-turn {
            border-color: #ffcc00;
            background-color: var(--yellow);
            transform: scale(1.1);
            box-shadow: 0 0 15px #ffcc00;
        }

        .classroom {
            position: relative;
            background-color: var(--green);
            border: 10px solid var(--primary);
            border-radius: 30px;
            height: 60vh;
            max-height: 600px;
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            overflow: hidden;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.1);
        }

        .game-item {
            position: absolute;
            font-size: 4rem;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .game-item:hover { transform: scale(1.2); }

        .found {
            animation: glow 1s alternate infinite;
            pointer-events: none;
            filter: drop-shadow(0 0 10px gold);
        }

        @keyframes glow {
            from { filter: drop-shadow(0 0 5px gold); transform: scale(1.2); }
            to { filter: drop-shadow(0 0 20px gold); transform: scale(1.3); }
        }

        /* 🎉 NEW WIN MODAL (10 POINTS OVERLAY) */
        .win-modal {
            display: none; 
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 30px;
            border: 12px solid #FFDAC1; 
            text-align: center;
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.8);
            animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            max-width: 90%;
            position: relative;
            z-index: 2001;
        }

        @keyframes popIn {
            from { transform: scale(0); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .modal-decorations { font-size: 4rem; margin: -20px 0 10px 0; display: block; }
        .modal-title { font-size: 3rem; color: #ff6b6b; margin-bottom: 10px; }
        .modal-subtitle { font-size: 2rem; color: #4ECDC4; margin-bottom: 30px; font-weight: bold; }

        .big-btn {
            font-size: 1.8rem;
            padding: 15px 40px;
            margin: 10px;
            border-radius: 30px;
            border: none;
            cursor: pointer;
            background-color: var(--blue);
            font-weight: bold;
            box-shadow: 0 6px 0px #88c2ac;
        }
        .big-btn:active { transform: translateY(6px); box-shadow: none; }

        /* CONFETTI */
        .confetti {
            position: fixed;
            width: 15px;
            height: 15px;
            background-color: red;
            top: -10px;
            z-index: 3000; 
            animation: fall linear forwards;
        }

        @keyframes fall {
            to { transform: translateY(110vh) rotate(360deg); }
        }

        @media (max-width: 600px) {
            h1 { font-size: 2.2rem; }
            .vocab-card { width: 140px; padding: 15px; }
            .vocab-emoji { font-size: 4rem; }
            .game-item { font-size: 3rem; }
            .player-score { font-size: 1.2rem; padding: 10px 15px; }
            .navbar { gap: 5px; padding: 10px; }
            .nav-btn { font-size: 1rem; padding: 8px 12px; }
            .modal-title { font-size: 2.2rem; }
            .modal-subtitle { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <div id="floating-bg" class="floating-bg"></div>

    <nav class="navbar">
        <button class="nav-btn home" onclick="showScreen('home-screen')">🏠 Home</button>
        <button class="nav-btn review" onclick="showScreen('review-screen')">📚 Review</button>
        <button class="nav-btn menu" onclick="showScreen('home-screen')">🎮 Menu</button>
        <button class="nav-btn exit" onclick="resetAndHome()">🚪 Exit</button>
    </nav>

    <div id="home-screen" class="screen active">
        <h1>🥗 The Good Food</h1>
        <p style="font-size: 1.5rem;">Welcome to the classroom! Let's learn about healthy food.</p>
        <button class="big-btn" style="background-color: var(--secondary);" onclick="showScreen('review-screen')">📚 Review Words</button>
        <button class="big-btn" style="background-color: var(--green);" onclick="startGame()">🎮 Play Game</button>
    </div>

    <div id="review-screen" class="screen">
        <h1>📚 Vocabulary Review</h1>
        <p style="font-size: 1.5rem;">Click the pictures to hear the words!</p>
        <div class="vocab-grid" id="vocab-container"></div>
        <br><br>
        <button class="big-btn" onclick="startGame()">🎮 Let's Play!</button>
    </div>

    <div id="game-screen" class="screen">
        <h1>🔍 Classroom Search (First to 10 Wins!)</h1>
        <div class="scoreboard">
            <div id="score-1" class="player-score active-turn">⭐ Player 1: <span id="p1-pts">0</span></div>
            <div id="score-2" class="player-score">⭐ Player 2: <span id="p2-pts">0</span></div>
        </div>
        <div class="classroom" id="classroom-area">
            </div>
    </div>

    <div id="win-modal" class="win-modal">
        <div class="modal-content">
            <span class="modal-decorations">⭐🏆⭐</span>
            <div class="modal-title" id="win-title">🎉 Congratulations Player 1! 🎉</div>
            <div class="modal-subtitle">🏅 You are the Healthy Food Hero! 🥗⭐</div>
            <button class="big-btn" style="background-color: var(--green);" onclick="playAgain()">🔁 Play Again</button>
            <button class="big-btn" style="background-color: var(--primary);" onclick="exitFromModal()">🚪 Exit</button>
        </div>
    </div>

    <div id="end-screen" class="screen" style="display:none;"></div>

    <script>
        // --- DATA ---
        const vocabItems = [
            { word: "Milk", emoji: "🥛" },

            { word: "Cheese", emoji: "🧀" },

            { word: "Rice", emoji: "🍚" },

            { word: "Egg", emoji: "🍳" },

            { word: "Water", emoji: "💧" },

            { word: "watermelon", emoji: "🍉" },

            { word: "mango", emoji: "🥭" },

            { word: "orange", emoji: "🍊" },

            { word: "strawberry", emoji: "🍓" },

            { word: "apple", emoji: "🍎" },

            { word: "grapes", emoji: "🍇" },

            { word: "corn", emoji: "🌽" },

            { word: "brocolli", emoji: "🥦" },

            { word: "avocado", emoji: "🥑" },

            { word: "carrot", emoji: "🥕" },

            { word: "kiwi", emoji: "🥝" },

            { word: "eggplant", emoji: "🍆" },

            { word: "mushrooms", emoji: "🍄‍🟫" },

            { word: "lemon", emoji: "🍋" },

            { word: "meat", emoji: "🥩" },

            { word: "salad", emoji: "🥗" },

            { word: "noodles", emoji: "🍜" },

            { word: "banana", emoji: "🍌" }
        ];

        const distractors = [
            { word: "Chair", emoji: "🪑" },
            { word: "Book", emoji: "📚" },
            { word: "Bag", emoji: "🎒" },
            { word: "Pencil", emoji: "✏️" },
            { word: "Laptop", emoji: "💻" }, 
            { word: "Crayon", emoji: "🖍️" },
            { word: "Ruler", emoji: "📏" }
        ];

        // 🌈 NEW: BACKGROUND FOOD DATA
        const bgFoods = ["🥛", "🧀", "🍚", "🍳", "💧", "🍉", "🥭", "🍊", "🍓", "🍎", "🍇", "🌽", "🥦", "🥑", "🥕", "🥝", "🍆", "🍄‍🟫", "🍋", "🥩", "🥗", "🍜", "🍌"];

        // --- GAME STATE ---
        let player1Score = 0;
        let player2Score = 0;
        let currentPlayer = 1;
        let foodsFound = 0;
        const GOAL_SCORE = 10;

        // --- SPEECH SYNTHESIS ---
        function speakWord(word) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(word);
            utterance.rate = 0.9;
            utterance.pitch = 1.2;
            window.speechSynthesis.speak(utterance);
        }

        // --- BROWSER AUDIO FOR SUCCESS CHIME (No downloads required) ---
        function playSuccessSound() {
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                const ctx = new AudioContext();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                
                osc.connect(gain);
                gain.connect(ctx.destination);
                
                osc.type = 'sine'; // Pleasant soft sound
                osc.frequency.setValueAtTime(523.25, ctx.currentTime); // C5
                osc.frequency.setValueAtTime(659.25, ctx.currentTime + 0.1); // E5
                osc.frequency.setValueAtTime(783.99, ctx.currentTime + 0.2); // G5
                osc.frequency.setValueAtTime(1046.50, ctx.currentTime + 0.3); // C6
                
                gain.gain.setValueAtTime(0.1, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + 1.5);
                
                osc.start(ctx.currentTime);
                osc.stop(ctx.currentTime + 1.5);
            } catch (e) {
                console.log("Audio not supported by browser");
            }
        }

        // --- NAVIGATION & SCREENS ---
        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('win-modal').style.display = 'none'; // Ensure modal closes
            document.getElementById(screenId).classList.add('active');
            window.scrollTo(0, 0);
        }

        function resetAndHome() {
            window.speechSynthesis.cancel();
            showScreen('home-screen');
        }

        function exitFromModal() {
            document.getElementById('win-modal').style.display = 'none';
            resetAndHome();
        }

        function playAgain() {
            document.getElementById('win-modal').style.display = 'none';
            startGame();
        }

        // --- BUILD VOCABULARY ---
        function buildVocab() {
            const container = document.getElementById('vocab-container');
            container.innerHTML = '';
            
            vocabItems.forEach(item => {
                const card = document.createElement('div');
                card.className = 'vocab-card';
                card.onclick = () => speakWord(item.word);
                
                card.innerHTML = `
                    <span class="vocab-emoji">${item.emoji}</span>
                    <span class="vocab-text">${item.word}</span>
                `;
                container.appendChild(card);
            });
        }

        // 🌈 NEW: INITIATE FLOATING BACKGROUND
        function initFloatingBackground() {
            const container = document.getElementById('floating-bg');
            const numFoods = 20; // Number of foods on screen at a time
            
            for(let i = 0; i < numFoods; i++) {
                const food = document.createElement('div');
                food.className = 'floating-food';
                food.innerText = bgFoods[Math.floor(Math.random() * bgFoods.length)];
                
                // Randomize size between 80px and 150px
                const size = Math.floor(Math.random() * 70) + 80;
                food.style.fontSize = size + 'px';
                
                // Randomize horizontal position
                food.style.left = Math.random() * 100 + 'vw';
                
                // Randomize animation speed (15s to 35s) so it feels gentle
                const duration = Math.random() * 20 + 15;
                food.style.animationDuration = duration + 's';
                
                // Stagger starting times so they don't all clump together
                const delay = Math.random() * -40;
                food.style.animationDelay = delay + 's';
                
                container.appendChild(food);
            }
        }

        // --- GAME LOGIC ---
        function startGame() {
            player1Score = 0;
            player2Score = 0;
            currentPlayer = 1;
            foodsFound = 0;
            document.getElementById('win-modal').style.display = 'none';
            
            updateScoreboard();
            setupClassroom();
            showScreen('game-screen');
            speakWord("Let's find the good food!");
        }

        function updateScoreboard() {
            document.getElementById('p1-pts').innerText = player1Score;
            document.getElementById('p2-pts').innerText = player2Score;
            
            if (currentPlayer === 1) {
                document.getElementById('score-1').classList.add('active-turn');
                document.getElementById('score-2').classList.remove('active-turn');
            } else {
                document.getElementById('score-2').classList.add('active-turn');
                document.getElementById('score-1').classList.remove('active-turn');
            }
        }

        function setupClassroom() {
            const classroom = document.getElementById('classroom-area');
            classroom.innerHTML = ''; 

            const allItems = [];
            
            // To ensure players can reach 10 points, we multiply the healthy food items
            for(let i = 0; i < 3; i++) {
                vocabItems.forEach(item => allItems.push({ ...item, isHealthy: true }));
            }
            
            // Multiply distractors so the classroom is full of items to search
            for(let i = 0; i < 2; i++) {
                distractors.forEach(item => allItems.push({ ...item, isHealthy: false }));
            }

            // Place them randomly
            allItems.forEach(item => {
                const el = document.createElement('div');
                el.className = 'game-item';
                el.innerText = item.emoji;
                
                el.style.left = Math.floor(Math.random() * 80 + 5) + '%';
                el.style.top = Math.floor(Math.random() * 75 + 5) + '%';
                
                el.onclick = () => handleItemClick(el, item);
                
                classroom.appendChild(el);
            });
        }

        function handleItemClick(element, itemData) {
            // Prevent clicking the same found item
            if(element.classList.contains('found')) return; 

            if (itemData.isHealthy) {
                // Correct!
                element.classList.add('found');
                speakWord(itemData.word);
                
                if (currentPlayer === 1) {
                    player1Score++;
                } else {
                    player2Score++;
                }
                
                updateScoreboard();

                // 🏆 WIN CONDITION CHECK (First to 10 points)
                if (player1Score >= GOAL_SCORE || player2Score >= GOAL_SCORE) {
                    setTimeout(() => triggerWinModal(currentPlayer), 500);
                    return; // Stop the turn switch
                }
                
                // Switch turn
                currentPlayer = currentPlayer === 1 ? 2 : 1;
                updateScoreboard();

            } else {
                // Incorrect
                speakWord("Try again!");
                element.style.transform = "translateX(-10px)";
                setTimeout(() => element.style.transform = "translateX(10px)", 100);
                setTimeout(() => element.style.transform = "translateX(0)", 200);
            }
        }

        // --- NEW MODAL WIN SEQUENCE ---
        function triggerWinModal(winningPlayer) {
            playSuccessSound(); // Plays cheerful sound
            shootConfetti();    // Triggers confetti
            
            // Update Text
            const titleText = document.getElementById('win-title');
            titleText.innerText = `🎉 Congratulations Player ${winningPlayer}! 🎉`;
            speakWord(`Congratulations Player ${winningPlayer}! You are the Healthy Food Hero!`);

            // Show Popup
            document.getElementById('win-modal').style.display = 'flex';
        }

        function shootConfetti() {
            const colors = ['#FF9AA2', '#FFB7B2', '#FFDAC1', '#E2F0CB', '#B5EAD7', '#C7CEEA'];
            for(let i=0; i<150; i++) {
                const conf = document.createElement('div');
                conf.classList.add('confetti');
                conf.style.left = Math.random() * 100 + 'vw';
                conf.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                conf.style.animationDuration = (Math.random() * 3 + 2) + 's';
                conf.style.opacity = Math.random() + 0.5;
                document.body.appendChild(conf);
                
                setTimeout(() => conf.remove(), 5000);
            }
        }

        // Initialize on load
        window.onload = () => {
            buildVocab();
            initFloatingBackground(); // 🌈 START BACKGROUND ANIMATION
        };
    </script>
</body>
</html>
