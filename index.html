<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Healthy Food Hero Challenge</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&family=Quicksand:wght@600&display=swap" rel="stylesheet">
</head>
<nav class="nav-bar">
    <button class="nav-btn home-btn" onclick="scrollToTop()">🏡 Home</button>
    <button class="nav-btn menu-btn" onclick="toggleMenu()">🎮 Menu</button>
    <button class="nav-btn exit-btn" onclick="showExitModal()">🚪 Exit</button>
</nav>

<div id="menu-modal" class="modal">
    <div class="modal-content">
        <h2>Choose Where to Go!</h2>
        <button class="link-btn" onclick="goToSection('vocabulary')">📚 Vocabulary</button>
        <button class="link-btn" onclick="goToSection('challenge')">🎮 Challenge</button>
        <button class="link-btn" onclick="goToSection('rewards')">🏆 Rewards</button>
        <button class="close-btn" onclick="toggleMenu()">Close</button>
    </div>
</div>

<div id="exit-modal" class="modal">
    <div class="modal-content">
        <h2>Are you sure you want to stop playing?</h2>
        <button class="yes-btn" onclick="confirmExit()">✅ Yes, Exit</button>
        <button class="no-btn" onclick="closeExitModal()">❌ No, Keep Playing</button>
    </div>
</div>
    
<body>

    <div class="app-container">
        <div id="vocab-screen" class="screen">
            <div class="hero">
                <h1>🥗 The Good Food</h1>
                <p>Let's learn healthy foods and become Healthy Food Heroes!</p>
                <div class="mascot">🍎</div>
            </div>
            
            <div class="vocab-grid" id="vocab-grid"></div>

            <div class="transition-zone">
                <button id="start-game-btn" class="main-btn hidden">🎮 Start Healthy Hero Challenge</button>
            </div>
        </div>

        <div id="game-screen" class="screen hidden">
            <h2 id="question-text">Is this GOOD FOOD or JUNK FOOD?</h2>
            <div class="game-card">
                <div id="game-emoji">🍎</div>
            </div>
            <div class="game-btns">
                <button class="btn green" onclick="checkAnswer(true)">🟢 GOOD FOOD</button>
                <button class="btn red" onclick="checkAnswer(false)">🔴 JUNK FOOD</button>
            </div>
            <p>Score: <span id="score">0</span></p>
        </div>

        <div id="end-screen" class="screen hidden">
            <h1>🏆 Congratulations!</h1>
            <p>You are a Healthy Food Hero!</p>
            <div class="stars" id="final-score-display"></div>
            <button class="main-btn" onclick="location.reload()">Play Again</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
