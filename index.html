<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Good Food Sorting Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="game-container">
        <!-- Header -->
        <header>
            <h1>Good Food Sorting Game</h1>
            <div id="score-board">⭐ Score: <span id="score">0</span></div>
        </header>

        <!-- Game Area -->
        <div id="game-area">
            <div id="display-card">
                <div id="food-emoji">🍎</div>
                <h2 id="food-name">Apple</h2>
            </div>
            
            <div id="feedback-message"></div>

            <div class="choice-buttons">
                <button id="btn-good" class="choice-btn good">🟢 GOOD FOOD</button>
                <button id="btn-junk" class="choice-btn junk">🔴 JUNK FOOD</button>
            </div>
        </div>

        <!-- End Screen -->
        <div id="end-screen" class="hidden">
            <h2>Game Finished!</h2>
            <p>Your Final Score: <span id="final-score">0</span></p>
            <button onclick="location.reload()" class="restart-btn">Play Again</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
