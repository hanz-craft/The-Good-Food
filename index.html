<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Healthy Food Hero Challenge</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="game-wrapper">
        <!-- 1. VOCABULARY REVIEW SCREEN -->
        <div id="vocab-screen">
            <h1>🌈 Vocabulary Review</h1>
            <p>Tap a food to hear its name!</p>
            <div class="display-box" id="preview-box">
                <div id="preview-emoji">🍎</div>
                <h2 id="preview-name">Apple</h2>
            </div>
            <div class="vocab-grid" id="vocab-grid"></div>
            <button id="start-game-btn" class="main-btn hidden">🎮 Start Healthy Hero Challenge</button>
        </div>

        <!-- 2. GAME SCREEN -->
        <div id="game-screen" class="hidden">
            <h1 id="level-title">Level 1: Easy</h1>
            <div class="game-box">
                <div id="game-emoji">🍎</div>
            </div>
            <div class="game-controls">
                <button class="choice-btn healthy" onclick="submitAnswer(true)">🟢 Good Food</button>
                <button class="choice-btn junk" onclick="submitAnswer(false)">🔴 Junk Food</button>
            </div>
            <div id="feedback"></div>
            <p>Score: <span id="score">0</span></p>
        </div>

        <!-- 3. FINAL REWARD SCREEN -->
        <div id="final-screen" class="hidden">
            <h1>🎉 Well Done!</h1>
            <div class="reward-emoji">🏆</div>
            <h2>You are a Healthy Food Hero!</h2>
            <p>Final Score: <span id="final-score">0</span></p>
            <button class="main-btn" onclick="location.reload()">Play Again</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
