<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Good Food - Learning Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <!-- Vocabulary Review Section -->
        <section id="vocab-section">
            <h1>🌈 The Good Food</h1>
            <div class="content-wrapper">
                <!-- Sidebar -->
                <div class="sidebar" id="vocab-list">
                    <!-- Items generated by JS -->
                </div>

                <!-- Preview Panel -->
                <div class="main-preview" id="preview-area">
                    <div id="display-card" class="pop-animation">
                        <div id="preview-emoji">🍎</div>
                        <h2 id="preview-name">Apple</h2>
                        <button id="repeat-audio" class="audio-btn">🔊 Listen Again</button>
                    </div>
                    <button id="start-game-btn" class="start-btn">🎮 Start the Game</button>
                </div>
            </div>
        </section>

        <!-- Game Section (Hidden initially) -->
        <section id="game-section" class="hidden">
            <h1 id="game-title">Good Food Sorting</h1>
            <div id="game-card">
                <div id="game-emoji">🍎</div>
                <h2 id="game-name">Apple</h2>
            </div>
            <div class="feedback" id="feedback"></div>
            <div class="btn-group">
                <button class="game-btn healthy" onclick="checkAnswer(true)">🟢 Good Food</button>
                <button class="game-btn junk" onclick="checkAnswer(false)">🔴 Junk Food</button>
            </div>
            <p>Score: <span id="score">0</span></p>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
